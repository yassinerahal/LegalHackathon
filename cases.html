<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - All Cases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              panel: "0 25px 80px rgba(36, 60, 104, 0.14)",
              soft: "0 10px 30px rgba(57, 84, 140, 0.08)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(255,255,255,0.95),_rgba(226,232,240,0.82)_42%,_rgba(219,228,241,0.92)_100%)]">
      <!-- RESPONSIVE HEADER -->
      <header class="border-b border-slate-200/80 bg-white/90 backdrop-blur sticky top-0 z-40">
        <div class="mx-auto flex max-w-[1900px] items-center justify-between gap-4 px-4 py-3 md:gap-6 md:px-6 md:py-4">
          <!-- Logo and Brand -->
          <a href="index.html" class="flex min-w-0 items-center gap-2 md:gap-4" aria-label="Go to dashboard">
            <img src="icons/logo.png" alt="NEXTACT logo" class="h-12 w-auto shrink-0 object-contain md:h-16" />
            <div class="min-w-0 hidden sm:block">
              <h1 class="font-serif text-lg md:text-2xl font-semibold tracking-[0.16em] text-slate-800">NEXTACT</h1>
              <p class="text-[10px] md:text-[11px] uppercase tracking-[0.2em] text-amber-700">Legal operations dashboard</p>
            </div>
          </a>

          <!-- Desktop Navigation (md and up) -->
          <nav class="hidden items-center gap-2 rounded-2xl bg-slate-100/90 px-4 py-2 md:flex">
            <a href="index.html" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-500 transition hover:bg-white hover:text-slate-700">Dashboard</a>
            <a href="cases.html" class="rounded-xl bg-indigo-50 px-4 py-2 text-sm font-medium text-indigo-600 shadow-sm">Cases</a>
            <a href="clients.html" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-500 transition hover:bg-white hover:text-slate-700">Clients</a>
            <a id="nav-users-link" href="users.html" class="hidden rounded-xl px-4 py-2 text-sm font-medium text-slate-500 transition hover:bg-white hover:text-slate-700">Users</a>
          </nav>

          <!-- Right Controls - Desktop (md and up) -->
          <div class="hidden md:flex items-center gap-3">
            <div class="gtranslate_wrapper"></div>
            <div class="text-right">
              <span id="loggedInUserName" class="block text-sm font-semibold text-slate-700"></span>
              <span id="nav-user-role" class="text-[11px] uppercase tracking-[0.2em] text-slate-400"></span>
            </div>
            <button id="goDashboardBtn" type="button" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50" title="Dashboard" aria-label="Dashboard">Dashboard</button>
            <button id="toggleDarkModeBtn" type="button" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:-translate-y-0.5 hover:border-slate-300 hover:bg-slate-50" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
            <button id="billingBtn" type="button" class="icon-btn billing-icon-btn" title="Go to billing page" aria-label="Go to billing page"><span class="billing-symbol" aria-hidden="true">$</span></button>
            <button id="logoutBtn" type="button" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-slate-300 hover:bg-slate-50" title="Log out" aria-label="Log out">Logout</button>
          </div>

          <!-- Mobile Controls (below md) -->
          <div class="flex items-center gap-2 md:hidden">
            <button id="toggleDarkModeBtn" type="button" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
            <!-- Hamburger Button -->
            <button id="hamburger-btn" type="button" class="flex h-11 w-11 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:bg-slate-50" title="Toggle menu" aria-label="Toggle navigation menu" aria-expanded="false">
              <!-- Open Icon (3 lines) -->
              <svg id="hamburger-open-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="4" y1="12" x2="20" y2="12"></line>
                <line x1="4" y1="18" x2="20" y2="18"></line>
              </svg>
              <!-- Close Icon (X) - Hidden by default -->
              <svg id="hamburger-close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden h-6 w-6">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Mobile Menu Drawer (Hidden by default, md and up: hidden) -->
        <div id="mobile-menu" class="hidden border-t border-slate-200 bg-white flex-col space-y-3 px-4 py-4 md:hidden">
          <!-- Mobile Navigation Links -->
          <nav class="flex flex-col space-y-1">
            <a href="index.html" class="rounded-lg px-4 py-3 text-base font-medium text-slate-700 hover:bg-slate-50">Dashboard</a>
            <a href="cases.html" class="rounded-lg px-4 py-3 text-base font-medium text-indigo-600 bg-indigo-50">Cases</a>
            <a href="clients.html" class="rounded-lg px-4 py-3 text-base font-medium text-slate-700 hover:bg-slate-50">Clients</a>
            <a id="nav-users-link-mobile" href="users.html" class="hidden rounded-lg px-4 py-3 text-base font-medium text-slate-700 hover:bg-slate-50">Users</a>
          </nav>
          
          <!-- Mobile User Info -->
          <div class="border-t border-slate-200 pt-3">
            <div class="px-4 py-2">
              <p id="mobileLoggedInUserName" class="text-sm font-semibold text-slate-700"></p>
              <p id="mobileNavUserRole" class="text-xs uppercase tracking-[0.1em] text-slate-400"></p>
            </div>
          </div>

          <!-- GTranslate in Mobile Menu -->
          <div class="border-t border-slate-200 pt-3">
            <p class="px-4 text-xs font-semibold uppercase tracking-widest text-slate-500">Language</p>
            <div class="gtranslate_wrapper px-4 py-2"></div>
          </div>

          <!-- Mobile Action Buttons -->
          <div class="border-t border-slate-200 pt-3 space-y-2">
            <button id="goDashboardBtnMobile" type="button" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50" title="Dashboard" aria-label="Dashboard">Dashboard</button>
            <button id="billingBtnMobile" type="button" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50" title="Go to billing page" aria-label="Go to billing page">$ Billing</button>
            <button id="logoutBtnMobile" type="button" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50" title="Log out" aria-label="Log out">Logout</button>
          </div>
        </div>
      </header>

      <main class="container mx-auto max-w-6xl space-y-5 px-4 py-5 md:px-6">
        <section class="rounded-[28px] border border-slate-200/70 bg-white/90 p-5 shadow-panel">
          <div class="mb-4 flex items-center justify-between gap-4">
            <div>
              <h3 class="text-4xl font-light tracking-tight text-slate-800">All Cases</h3>
              <p class="mt-2 text-sm text-slate-500">Review every accessible legal matter in one modern overview.</p>
            </div>
            <a href="index.html" class="rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Back to Dashboard</a>
          </div>
          <form id="casesSearchForm" class="list-search-bar mb-5" role="search">
            <label for="casesSearchInput" class="sr-only">Search cases</label>
            <div class="list-search-input-wrap">
              <span class="list-search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m20 20-3.5-3.5"></path>
                </svg>
              </span>
              <input
                id="casesSearchInput"
                type="search"
                class="list-search-input"
                placeholder="Search by case name, client, description, deadline, or case number"
                autocomplete="off"
              />
            </div>
            <button type="submit" class="list-search-button">Search</button>
          </form>
          <ul id="allCasesList" class="list space-y-3"></ul>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="mobile-nav.js"></script>
    <script src="nav-sync.js"></script>
    <script src="cases-page.js"></script>
    <script>
      window.gtranslateSettings = {
        default_language: "en",
        languages: ["en", "de"],
        wrapper_selector: ".gtranslate_wrapper",
        flag_style: "2d",
        alt_flags: { en: "usa" }
      };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
  </body>
</html>
