version: '3.8'

services:
  # ---------------------------------------------------------
  # 1. THE NODE.JS BACKEND APPLICATION
  # ---------------------------------------------------------
  backend:
    build: ./backend
    container_name: nextact_backend
    ports:
      - "3000:3000" # Expose port 3000 for frontend access
    env_file:
      - .env # Load database and MinIO credentials securely
    depends_on:
      - postgres # Ensure database is running before backend starts
      - localstack # Ensure storage is running before backend starts
    volumes:
      # Mount local code to container for live development (hot-reloading)
      - ./backend:/usr/src/app
      # Prevent local node_modules from overwriting container's node_modules
      - /usr/src/app/node_modules

 # ---------------------------------------------------------
  # 2. THE POSTGRESQL DATABASE
  # ---------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nextact_db
    ports:
      - "5432:5432"
    # Here we map your custom .env variables to the names Postgres expects!
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

 # ---------------------------------------------------------
  # 3. THE LOCAL CLOUD STORAGE (LocalStack - Apache 2.0)
  # ---------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: nextact_storage
    ports:
      - "4566:4566" # This is the port for the S3 API
      - "4510-4559:4510-4559" # Required internal ports
    environment:
      # We tell LocalStack to ONLY boot up the S3 simulation
      - SERVICES=s3
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      # LocalStack needs access to the Docker socket to run properly
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the S3 data locally
      - storage_data:/var/lib/localstack/volume

# At the very bottom of your file, update the volumes list:
volumes:
  postgres_data:
  storage_data: