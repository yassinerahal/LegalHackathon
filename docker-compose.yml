version: "3.8"

services:
  backend:
    build: ./backend
    container_name: nextact_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    depends_on:
      - postgres # Ensure database is running before backend starts
      - localstack # Ensure storage is running before backend starts
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  postgres:
    image: postgres:15-alpine
    container_name: nextact_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

 # ---------------------------------------------------------
  # 3. THE LOCAL CLOUD STORAGE (LocalStack - Apache 2.0)
  # ---------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: nextact_storage
    restart: unless-stopped
    ports:
      - "4566:4566" # This is the port for the S3 API
      - "4510-4559:4510-4559" # Required internal ports
    environment:
      # We tell LocalStack to ONLY boot up the S3 simulation
      - SERVICES=s3
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      # LocalStack needs access to the Docker socket to run properly
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the S3 data locally
      - storage_data:/var/lib/localstack/volume

# At the very bottom of your file, update the volumes list:
volumes:
  postgres_data:
  storage_data:
