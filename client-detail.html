<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Client Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="brand brand-link" aria-label="Go to dashboard">
        <img src="icons/logo.png" alt="NEXTACT logo" class="brand-logo-image" />
        <div class="brand-copy">
          <h1>NEXTACT</h1>
          <p>Client settings and related cases</p>
        </div>
      </a>
      <div class="topbar-actions">
        <div class="gtranslate_wrapper"></div>
        <span id="loggedInUserName" class="header-user"></span>
        <button id="goDashboardBtn" type="button" class="icon-btn" title="Dashboard" aria-label="Dashboard">⏱</button>
        <button id="toggleDarkModeBtn" type="button" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
        <button id="billingBtn" type="button" class="icon-btn" title="Go to billing page" aria-label="Go to billing page"><img src="icons/billing-receipt-icon.svg" alt="" aria-hidden="true" /></button>
        <button id="logoutBtn" type="button" class="icon-btn" title="Log out" aria-label="Log out">⇥</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <h3 id="clientTitle" class="title-with-icon"><img src="icons/client-person-icon.svg" alt="" aria-hidden="true" />Client Settings</h3>
        </div>
        <form id="clientSettingsForm" class="modal-form client-settings-form">
          <label for="clientFullName">Name</label>
          <input id="clientFullName" type="text" />

          <label for="clientAddress">Address</label>
          <input id="clientAddress" type="text" />

          <label for="clientEmail">Email</label>
          <input id="clientEmail" type="email" />

          <label for="clientPhone">Phone</label>
          <input id="clientPhone" type="tel" />

          <label for="clientZipCode">ZIP Code</label>
          <input id="clientZipCode" type="text" />

          <label for="clientCity">City</label>
          <input id="clientCity" type="text" />

          <label for="clientState">State</label>
          <input id="clientState" type="text" />

          <p id="clientInfo" class="field-note"></p>
          <p id="remoteAccessInfo" class="field-note"></p>

          <div class="modal-actions">
            <button id="grantRemoteAccessBtn" type="button" class="btn-ghost">Grant Remote Access</button>
            <button id="deleteClientBtn" type="button" class="btn-danger">Delete Client</button>
            <button id="saveClientBtn" type="submit" class="btn-primary">Save Changes</button>
          </div>
        </form>
      </section>

      <section id="relatedCasesSection" class="panel">
        <div class="panel-head">
          <h3 class="title-with-icon"><img src="icons/clients-group-icon.svg" alt="" aria-hidden="true" />Related Cases</h3>
        </div>
        <ul id="relatedCasesList" class="list"></ul>
      </section>
    </main>

    <dialog id="remoteAccessDialog">
      <form method="dialog" class="modal-form">
        <h3>Remote Access Invitation</h3>
        <p class="field-note">
          Share this one-time setup link securely. The client will use it to create their own password.
        </p>

        <label for="remoteAccessLink">One-Time Setup Link</label>
        <input id="remoteAccessLink" type="text" readonly />

        <div class="remote-access-meta">
          <p id="remoteAccessExpiry" class="field-note"></p>
          <p class="field-note">The link expires after first use or when the expiry time is reached.</p>
        </div>

        <div class="portal-qr-wrap">
          <img id="remoteAccessQr" alt="QR code for the remote access setup link" class="portal-qr-image" />
        </div>

        <div class="modal-actions portal-access-actions">
          <button id="copyRemoteAccessBtn" type="button" class="btn-ghost">Copy Link</button>
          <button id="closeRemoteAccessBtn" type="button" class="btn-primary">Done</button>
        </div>
      </form>
    </dialog>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="client-detail.js"></script>
    <script>
      window.gtranslateSettings = {
        default_language: "en",
        languages: ["en", "de"],
        wrapper_selector: ".gtranslate_wrapper",
        flag_style: "2d",
        alt_flags: { en: "usa" }
      };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
  </body>
</html>
