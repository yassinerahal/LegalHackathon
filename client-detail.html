<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Client Detail</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">⏱</span>
        <div>
          <h1 id="clientTitle">Client</h1>
          <p>Profile and related cases</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="loggedInUserName" class="header-user"></span>
        <button id="goDashboardBtn" type="button" class="icon-btn" title="Dashboard" aria-label="Dashboard">⏱</button>
        <button id="toggleDarkModeBtn" type="button" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
        <button id="logoutBtn" type="button" class="icon-btn" title="Log out" aria-label="Log out">⇥</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <h3>Client Information</h3>
        </div>
        <p id="clientInfo" class="meta"></p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Related Cases</h3>
        </div>
        <ul id="relatedCasesList" class="list"></ul>
      </section>
    </main>

    <script src="client-detail.js"></script>
  </body>
</html>
