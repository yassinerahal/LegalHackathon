<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Login</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <img src="icons/logo.png" alt="NEXTACT logo" class="auth-logo" />
        <a href="home.html" class="auth-home-link">← Back to homepage</a>
        <h1>Welcome Back</h1>
        <p class="muted">Sign in to NEXTACT. Remote users use the same email address they received access for.</p>

        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Enter password" />

        <p id="authMessage" class="message"></p>

        <button id="loginBtn" class="btn-primary" type="button">Log In</button>
        <p class="switch-link">
          Staff only:
          <a href="signup.html">Create an internal account</a>
        </p>
      </section>
    </main>
    <script src="api.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
