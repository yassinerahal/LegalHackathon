<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT – Dokument-Zeitstrahl</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ── Navbar active state ── */
      .nav-link {
        font-size: 0.88rem;
        color: var(--muted);
        text-decoration: none;
        padding: 0.35rem 0.65rem;
        border-radius: 8px;
        transition: background 0.15s, color 0.15s;
      }
      .nav-link:hover { background: #f0f4ff; color: var(--primary); }
      .nav-link.active { background: #eef1ff; color: var(--primary); font-weight: 600; }

      /* ── Toolbar ── */
      .tl-toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
      }
      .tl-toolbar label {
        font-size: 0.85rem;
        color: var(--muted);
      }
      .tl-toolbar select,
      .tl-toolbar input[type="text"] {
        width: auto;
        min-width: 180px;
        font-size: 0.85rem;
        padding: 0.42rem 0.65rem;
      }
      .tl-toolbar input[type="text"] { min-width: 220px; }
      .tl-count {
        margin-left: auto;
        font-size: 0.82rem;
        color: var(--muted);
      }

      /* ── Legend ── */
      .tl-legend {
        display: flex;
        gap: 1.2rem;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
      }
      .tl-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── Timeline ── */
      .tl-body {
        position: relative;
        padding-left: 36px;
      }
      .tl-spine {
        position: absolute;
        left: 11px;
        top: 6px;
        bottom: 0;
        width: 1px;
        background: var(--line);
      }
      .tl-group { margin-bottom: 1.75rem; }
      .tl-month-label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.75rem;
      }

      /* ── Event card ── */
      .tl-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 0.65rem;
        position: relative;
      }
      .tl-dot {
        position: absolute;
        left: -29px;
        top: 10px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid var(--bg);
        flex-shrink: 0;
        background: #1D9E75;
      }
      .tl-card {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0.7rem 0.9rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.15rem 0.5rem;
        align-items: start;
      }
      .tl-card:hover { border-color: #c5d0f0; }

      .tl-file-name {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 7px;
        grid-column: 1;
      }
      .tl-ext {
        font-size: 0.68rem;
        font-weight: 700;
        background: #eef1ff;
        color: #2f51ca;
        padding: 1px 6px;
        border-radius: 4px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .tl-case-name {
        font-size: 0.8rem;
        color: var(--muted);
        grid-column: 1;
        margin-top: 1px;
      }
      .tl-client-badge {
        grid-column: 1;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: 4px;
        font-size: 0.75rem;
        color: #0b7d4d;
        background: #e7f8f0;
        border-radius: 20px;
        padding: 2px 8px;
        width: fit-content;
      }
      .tl-date-col {
        grid-column: 2;
        grid-row: 1 / span 3;
        align-self: center;
        font-size: 0.78rem;
        color: var(--muted);
        text-align: right;
        white-space: nowrap;
      }

      /* ── Empty state ── */
      .tl-empty {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .tl-empty-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        display: block;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="brand brand-link" aria-label="Go to dashboard">
        <img src="icons/logo.png" alt="NEXTACT logo" class="brand-logo-image" />
        <div class="brand-copy">
          <h1>NEXTACT</h1>
          <p>Simple legal practice workspace</p>
        </div>
      </a>
      <div class="topbar-actions">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="timeline.html" class="nav-link active">Zeitstrahl</a>
        <button id="logoutBtn" class="btn-ghost">Log Out</button>
      </div>
    </header>

    <main class="container">
      <div class="panel">
        <div class="panel-head">
          <h3>Dokument-Zeitstrahl</h3>
        </div>

        <!-- Toolbar -->
        <div class="tl-toolbar">
          <label for="filterClient">Klient</label>
          <select id="filterClient" aria-labelledby="filterClient">
            <option value="all">Alle Klienten</option>
          </select>

          <label for="filterCase">Fall</label>
          <select id="filterCase" aria-labelledby="filterCase">
            <option value="all">Alle Fälle</option>
          </select>

          <input type="text" id="filterSearch" placeholder="Dateiname suchen…" aria-label="Dateiname suchen" />

          <span class="tl-count" id="resultCount"></span>
        </div>

        <!-- Legend -->
        <div class="tl-legend">
          <div class="tl-legend-item">
            <div class="legend-dot" style="background:#1D9E75"></div>
            Hochgeladenes Dokument
          </div>
        </div>

        <!-- Timeline -->
        <div class="tl-body">
          <div class="tl-spine"></div>
          <div id="timelineContent"></div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script>
      /* ─── Session guard ─────────────────────────────── */
      requireSession();

      /* ─── Helpers ───────────────────────────────────── */
      function fmtDate(ts) {
        return new Date(ts).toLocaleDateString("de-AT", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric"
        });
      }

      function fmtTime(ts) {
        return new Date(ts).toLocaleTimeString("de-AT", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function monthKey(ts) {
        return new Date(ts).toLocaleDateString("de-AT", {
          month: "long",
          year: "numeric"
        });
      }

      function getExt(filename) {
        return filename.split(".").pop().toUpperCase() || "—";
      }

      /* ─── Collect all document events from state ────── */
      function buildEvents() {
        const events = [];
        state.cases.forEach((c) => {
          (c.uploadedDocuments || []).forEach((doc) => {
            events.push({
              ts: doc.uploadedAt || 0,
              name: doc.name,
              caseTitle: c.title,
              clients: c.clientNames || []
            });
          });
        });
        return events;
      }

      /* ─── Populate filter dropdowns ─────────────────── */
      function populateFilters(events) {
        const clientSel = document.getElementById("filterClient");
        const caseSel   = document.getElementById("filterCase");

        const clients = [...new Set(events.flatMap((e) => e.clients))].sort();
        const cases   = [...new Set(events.map((e) => e.caseTitle))].sort();

        clients.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = String(c);
          opt.textContent = String(c);
          clientSel.appendChild(opt);
        });

        cases.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = String(c);
          opt.textContent = String(c);
          caseSel.appendChild(opt);
        });
      }

      /* ─── Render timeline ───────────────────────────── */
      function renderTimeline() {
        const clientVal = document.getElementById("filterClient").value;
        const caseVal   = document.getElementById("filterCase").value;
        const search    = document.getElementById("filterSearch").value.trim().toLowerCase();

        let events = buildEvents();

        if (clientVal !== "all")
          events = events.filter((e) => e.clients.includes(clientVal));
        if (caseVal !== "all")
          events = events.filter((e) => e.caseTitle === caseVal);
        if (search)
          events = events.filter((e) => e.name.toLowerCase().includes(search));

        /* Sort newest first */
        events.sort((a, b) => b.ts - a.ts);

        document.getElementById("resultCount").textContent =
          events.length === 1 ? "1 Dokument" : `${events.length} Dokumente`;

        const content = document.getElementById("timelineContent");

        if (!events.length) {
          content.innerHTML = `
            <div class="tl-empty">
              <span class="tl-empty-icon">📂</span>
              Keine Dokumente gefunden.
            </div>`;
          return;
        }

        /* Group by month */
        const groups = {};
        events.forEach((e) => {
          const k = e.ts ? monthKey(e.ts) : "Datum unbekannt";
          if (!groups[k]) groups[k] = [];
          groups[k].push(e);
        });

        let html = "";
        for (const [month, items] of Object.entries(groups)) {
          html += `<div class="tl-group"><div class="tl-month-label">${month}</div>`;
          items.forEach((e) => {
            const ext      = getExt(e.name);
            const dateStr  = e.ts ? fmtDate(e.ts) : "—";
            const timeStr  = e.ts ? fmtTime(e.ts) : "";
            const clientBadges = e.clients
              .map((c) => `<span class="tl-client-badge">👤 ${c}</span>`)
              .join(" ");

            html += `
              <div class="tl-item">
                <div class="tl-dot"></div>
                <div class="tl-card">
                  <div class="tl-file-name">
                    <span class="tl-ext">${ext}</span>
                    ${e.name}
                  </div>
                  <div class="tl-date-col">${dateStr}<br><span style="font-size:0.72rem">${timeStr}</span></div>
                  <div class="tl-case-name">📁 ${e.caseTitle}</div>
                  <div>${clientBadges}</div>
                </div>
              </div>`;
          });
          html += "</div>";
        }
        content.innerHTML = html;
      }

      /* ─── Wire up filters ───────────────────────────── */
      const allEvents = buildEvents();
      populateFilters(allEvents);
      renderTimeline();

      ["filterClient", "filterCase", "filterSearch"].forEach((id) => {
        document.getElementById(id).addEventListener("input", renderTimeline);
      });

      /* ─── Logout ────────────────────────────────────── */
      document.getElementById("logoutBtn").addEventListener("click", () => {
        if (!window.confirm("Are you sure you want to log out?")) return;
        localStorage.removeItem("nextact_current_user");
        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
