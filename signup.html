<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <div class="gtranslate_wrapper"></div>
        <img src="icons/logo.png" alt="NEXTACT logo" class="auth-logo" />
        <a href="home.html" class="auth-home-link">← Back to homepage</a>
        <h1>Create Account</h1>
        <p class="muted">Start using NEXTACT in seconds.</p>

        <label for="signupName">Full Name</label>
        <input id="signupName" type="text" placeholder="Your name" />

        <label for="signupEmail">Email</label>
        <input id="signupEmail" type="email" placeholder="you@example.com" />

        <label for="signupPassword">Password</label>
        <input id="signupPassword" type="password" placeholder="At least 6 characters" />

        <p id="authMessage" class="message"></p>

        <button id="signupBtn" class="btn-primary" type="button">Create Account</button>
        <p class="switch-link">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
      window.gtranslateSettings = {
        default_language: "en",
        languages: ["en", "de"],
        wrapper_selector: ".gtranslate_wrapper",
        flag_style: "2d",
        alt_flags: { en: "usa" }
      };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
  </body>
</html>
