<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Case Details</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="brand brand-link" aria-label="Go to dashboard">
        <img src="icons/logo.png" alt="NEXTACT logo" class="brand-logo-image" />
        <div class="brand-copy">
          <h1>NEXTACT</h1>
          <p>Single case overview</p>
        </div>
      </a>
      <div class="topbar-actions">
        <span id="loggedInUserName" class="header-user"></span>
        <button id="goDashboardBtn" type="button" class="icon-btn" title="Dashboard" aria-label="Dashboard">⏱</button>
        <button id="toggleDarkModeBtn" type="button" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
        <button id="billingBtn" type="button" class="icon-btn" title="Go to billing page" aria-label="Go to billing page">$</button>
        <button id="logoutBtn" type="button" class="icon-btn" title="Log out" aria-label="Log out">⇥</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <h3 id="caseTitle">Case</h3>
          <div class="case-actions">
            <span id="caseStatusBadge" class="badge">Active</span>
            <button id="editCaseBtn" type="button" class="btn-ghost btn-small">Edit</button>
          </div>
        </div>
        <p id="caseMeta" class="meta"></p>
        <p id="caseDescription" class="case-comment"></p>
        <p id="caseDeadline" class="case-doc-status"></p>
      </section>

      <section class="grid-2">
        <article class="panel">
          <div class="panel-head">
            <h3>Uploaded Documents</h3>
          </div>
          <div id="detailDropZone" class="drop-zone modern-drop-zone">
            <span class="drop-zone-icon" aria-hidden="true">☁</span>
            <p class="drop-zone-title">Drag & Drop files here</p>
            <p class="drop-zone-subtitle">or</p>
            <button type="button" class="drop-zone-browse">Browse Files</button>
            <input id="detailCaseDocuments" type="file" multiple />
          </div>
          <p id="detailFileCount" class="field-note"></p>
          <div id="uploadedDocumentsGrid" class="uploaded-file-boxes"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h3>Required Placeholders</h3>
          </div>
          <section class="doc-placeholder-section">
            <div class="doc-placeholder-row">
              <input
                id="detailDocPlaceholderName"
                type="text"
                placeholder="Example: Signed Power of Attorney"
              />
              <select id="detailDocPlaceholderStatus">
                <option value="Pending">Pending</option>
                <option value="Uploaded">Uploaded</option>
              </select>
              <button id="detailAddDocPlaceholderBtn" type="button" class="btn-ghost">Add</button>
            </div>
          </section>
          <ul id="requiredDocsList" class="doc-placeholder-list"></ul>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Comments (Newest First)</h3>
        </div>
        <ul id="commentsList" class="list"></ul>
      </section>

      <div class="page-danger-zone">
        <button id="deleteCaseBtn" type="button" class="btn-danger">Delete Case</button>
      </div>
    </main>

    <dialog id="editCaseModal">
      <form method="dialog" class="modal-form">
        <h3>Edit Case</h3>

        <label for="editCaseName">Case Name</label>
        <input id="editCaseName" type="text" />

        <label for="editClientNames">Client Name(s)</label>
        <input id="editClientNames" type="text" placeholder="Comma separated clients" />

        <label for="editCaseStatus">Case Status</label>
        <select id="editCaseStatus">
          <option value="Active">Active</option>
          <option value="On Hold">On Hold</option>
          <option value="Finished">Finished</option>
        </select>

        <label for="editCaseDeadline">Deadline</label>
        <input id="editCaseDeadline" type="date" />

        <label for="editCaseDescription">Short Description</label>
        <textarea id="editCaseDescription" rows="3"></textarea>

        <label for="editCaseComment">Add Comment</label>
        <textarea id="editCaseComment" rows="2" placeholder="Optional update comment"></textarea>

        <div class="modal-actions">
          <button id="finishCaseBtn" type="button" class="btn-ghost">Finish Case</button>
          <button id="cancelEditBtn" type="button" class="btn-ghost">Cancel</button>
          <button id="saveEditBtn" type="button" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </dialog>

    <div id="fileContextMenu" class="context-menu hidden">
      <button id="ctxDownloadBtn" type="button" class="btn-ghost">Download</button>
      <button id="ctxCopyBtn" type="button" class="btn-ghost">Copy File</button>
      <button id="ctxRemoveBtn" type="button" class="btn-ghost">Remove</button>
    </div>
    <script src="api.js"></script>
    <script src="case-detail.js"></script>
  </body>
</html>
