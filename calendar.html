<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Calendar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">NA</span>
        <div>
          <h1>NEXTACT Calendar</h1>
          <p>All deadlines in one place</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="backToDashboardBtn" class="btn-ghost" type="button">Dashboard</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Log Out</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <h3>Deadline Calendar</h3>
          <div class="calendar-controls">
            <button id="calendarPrevBtn" class="btn-ghost" type="button">Prev</button>
            <p id="calendarMonthLabel" class="calendar-month-label"></p>
            <button id="calendarNextBtn" class="btn-ghost" type="button">Next</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <script src="calendar-page.js"></script>
  </body>
</html>
