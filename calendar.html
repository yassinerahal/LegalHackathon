<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTACT - Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="brand brand-link" aria-label="Go to dashboard">
        <img src="icons/logo.png" alt="NEXTACT logo" class="brand-logo-image" />
        <div class="brand-copy">
          <h1>NEXTACT</h1>
          <p>All deadlines in one place</p>
        </div>
      </a>
      <div class="topbar-actions">
        <div class="gtranslate_wrapper"></div>
        <span id="loggedInUserName" class="header-user"></span>
        <button id="goDashboardBtn" type="button" class="icon-btn" title="Dashboard" aria-label="Dashboard">⏱</button>
        <button id="toggleDarkModeBtn" type="button" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
        <button id="billingBtn" type="button" class="icon-btn" title="Go to billing page" aria-label="Go to billing page"><img src="icons/billing-receipt-icon.svg" alt="" aria-hidden="true" /></button>
        <button id="logoutBtn" type="button" class="icon-btn" title="Log out" aria-label="Log out">⇥</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <h3 class="title-with-icon"><img src="icons/deadline-list-icon.svg" alt="" aria-hidden="true" />Deadline Calendar</h3>
          <div class="calendar-controls">
            <button id="calendarPrevBtn" class="btn-ghost" type="button">Prev</button>
            <p id="calendarMonthLabel" class="calendar-month-label"></p>
            <button id="calendarNextBtn" class="btn-ghost" type="button">Next</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>
    <script src="api.js"></script>
    <script src="calendar-page.js"></script>
    <script>
      window.gtranslateSettings = {
        default_language: "en",
        languages: ["en", "de"],
        wrapper_selector: ".gtranslate_wrapper",
        flag_style: "2d",
        alt_flags: { en: "usa" }
      };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
  </body>
</html>
